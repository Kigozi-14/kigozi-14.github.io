<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>post_page</title>
</head>
<body>

    {% if message %}
        <h1><p class="message">{{ message | safe }}</p></h1>
    {% endif %}
    
    <form method="POST" action="/submit" enctype="multipart/form-data">
        <label><h3>FOR MY BLOG POSTS</h3></label>
        <input type="text" id="currentDate" name="currentDate" readonly>
        <input type="text" name="description" placeholder="Description" />
        <input type="file" name="image_file" placeholder="Upload Image Here"/>
        <input type="password" name="password" placeholder="password" />
        <ul class="actions">
            <li><input type="submit" value="Send Message" /></li>
            <li><input type="reset" value="Clear Form" class="alt" /></li>
        </ul>
    </form>

    <form method="POST" action="/delete" enctype="multipart/form-data">
        <label><h3>FOR NATIONAL ID</h3></label>
        <input type="number" id="quantity" name="post_number" min="1" max="100" required><br><br>
        <input type="text" name="password" placeholder="password" />

        <ul class="actions">
            <li><input type="submit" value="Send Message" /></li>
            <li><input type="reset" value="Clear Form" class="alt" /></li>
        </ul>
    </form>

    <script>
        const currentDate = new Date().toISOString().slice(0, 10);
        document.getElementById('currentDate').value = currentDate;
    </script>

</body>
</html>
